                                    description: Role assigned to the API Credential on the Workspace.
                                    x-speakeasy-unknown-values: allow
                              products:
                                description: Product-level Roles assigned to the API Credential for the Workspace.
                                type: array
                                items:
                                  type: object
                                  properties:
                                    product:
                                      description: Product name.
                                      example: stream
                                      allOf:
                                        - type: string
                                          enum:
                                            - edge
                                            - search
                                            - stream
                                            - lake
                                          description: Product name.
                                          x-speakeasy-unknown-values: allow
                                    role:
                                      description: Role assigned to the API Credential on the product.
                                      example: admin
                                      allOf:
                                        - type: string
                                          enum:
                                            - admin
                                            - editor
                                            - reader
                                            - user
                                            - noaccess
                                          description: Role assigned to the API Credential on the product.
                                          x-speakeasy-unknown-values: allow
                                  required:
                                    - product
                                    - role
                            required:
                              - workspaceId
                              - workspaceRole
                      required:
                        - organizationRole
                ipAllowlist:
                  description: CIDR range enforced as the IP allowlist for the API Credential.
                  example:
                    - 10.0.0.1/32
                  type: array
                  items:
