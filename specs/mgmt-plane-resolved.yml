                  createdBy:
                    type: string
                    description: Member who created the API Credential.
                    example: user@example.com
                  createdDate:
                    type: string
                    description: ISO 8601 timestamp when the API Credential was created.
                    format: date-time
                    example: 2024-08-15 12:34:56+00:00
                  lastUpdatedBy:
                    type: string
                    description: Member who last updated the API Credential.
                    example: user@example.com
                  lastUpdatedDate:
                    type: string
                    description: ISO 8601 timestamp when the API Credential was last updated.
                    format: date-time
                    example: 2024-08-15 12:34:56+00:00
                  clientSecret:
                    type: string
                    description: Client Secret for the API Credential. The Client Secret is sensitive information and should
                      be kept private. Returned only in the <code>POST</code> response when the API Credential is created.
                      Never returned in <code>GET</code> responses. If you need the Client Secret again, you must rotate credentials
                      and retrieve the new Client Secret from the <code>POST</code> response.
                    example: clientSecretabcd1234EXAMPLE
                required:
                  - name
                  - description
                  - enabled
                  - organizationId
                  - clientId
                  - roles
                  - ipAllowlist
                  - createdBy
                  - createdDate
                  - lastUpdatedBy
                  - lastUpdatedDate
                  - clientSecret
        "409":
          description: Could not create API Credential because it already exists
        "422":
