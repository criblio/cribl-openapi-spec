  /v1/organizations/{organizationId}/billing/credits/contracts-utilization:
    get:
      description: '**This endpoint is in development with restricted availability**. We do not recommend using this endpoint
        in production. Functionality might change without notice. Contact [Cribl Support](https://cribl.io/support/) to request
        access.


        Get cumulative credit utilization data grouped by contract period for the specified Organization.'
      operationId: v1.billing.getContractsUtilization
      parameters:
        - name: organizationId
          required: true
          in: path
          description: The <code>id</code> of the Organization.
          schema:
            type: string
        - name: startingOn
          required: true
          in: query
          description: Inclusive start of the query date range in ISO 8601 format.
          schema:
            format: date-time
            example: 2025-05-01 00:00:00+00:00
            type: string
        - name: endingBefore
